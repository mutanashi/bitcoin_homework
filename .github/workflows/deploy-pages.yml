name: Deploy BTC Dashboard to Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject config
        env:
          S3_URL:   ${{ secrets.S3_URL }}
          NEWS_KEY: ${{ secrets.NEWS_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, pathlib
          p = pathlib.Path("btc-dashboard/index.html")
          t = p.read_text()
          t = t.replace("window.S3_URL   || ''", f"'{os.environ.get('S3_URL','')}'")
          t = t.replace("window.NEWS_KEY || ''", f"'{os.environ.get('NEWS_KEY','')}'")
          p.write_text(t)
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: btc-dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
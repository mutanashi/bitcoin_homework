Weighed public S3 bucket versus API Gateway solutions
Weighed public S3 bucket versus API Gateway solutions
好消息：這個架構根本不需要 API Key！
因為你的資料流是：

Lambda → 寫入 S3 → 前端直接讀 S3 JSON
S3 的 JSON 是公開資料（BTC 價格），不是私密資料，所以只要把 S3 設成公開讀取就好。

步驟
1. S3 設定公開讀取
去 AWS S3 Console → 你的 bucket：

Permissions → Block public access → 全部關掉

然後加上 Bucket Policy：

json
{
  "Version": "2012-10-17",
  "Statement": [
    {
      "Effect": "Allow",
      "Principal": "*",
      "Action": "s3:GetObject",
      "Resource": "arn:aws:s3:::你的bucket名稱/*"
    }
  ]
}
2. S3 設定 CORS（讓瀏覽器可以讀）
S3 → Permissions → CORS：

json
[
  {
    "AllowedHeaders": ["*"],
    "AllowedMethods": ["GET"],
    "AllowedOrigins": ["https://mutanashi.github.io"],
    "ExposeHeaders": []
  }
]
3. 前端直接抓 S3 網址
你的 index.html 改成：

javascript
const S3_URL = "https://你的bucket.s3.amazonaws.com/history.json";
fetch(S3_URL)
  .then(res => res.json())
  .then(data => renderChart(data));
整體架構
Lambda（定時寫資料）
    ↓
S3（公開 JSON 檔）
    ↓
GitHub Pages 前端（直接 fetch，不需要 Key）
    ↑
任何人都可以用 ✅
沒有 API Key 暴露的問題，因為 S3 只開放 GET（讀取），Lambda 的寫入權限還是私密的。


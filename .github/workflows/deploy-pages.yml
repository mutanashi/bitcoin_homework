      "apiKey": "你的正確API Key貼這裡"
    }
  ]
}
儲存後重新載入 VS Code
常見原因
原因	處理方式
API Key 貼錯或有多餘空格	重新複製貼上
API Key 已被刪除或重新產生	去 AI Studio 重新建立
未啟用 Generative Language API	在 Google Cloud Console 啟用

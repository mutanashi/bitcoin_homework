name: Deploy BTC Dashboard to Pages
 
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小時自動更新
  workflow_dispatch:
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: pages
  cancel-in-progress: false
 
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Inject API keys into HTML
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ALPHA_KEY: ${{ secrets.ALPHA_KEY }}
        run: |
          python3 - <<'EOF'
          import os, pathlib
          p = pathlib.Path("btc-dashboard/index.html")
          t = p.read_text()
          t = t.replace("window.NEWS_API_KEY || ''", f"'{os.environ['NEWS_API_KEY']}'")
          t = t.replace("window.ALPHA_KEY    || ''", f"'{os.environ['ALPHA_KEY']}'")
          p.write_text(t)
          EOF
 
      - name: Setup Pages
        uses: actions/configure-pages@v5
 
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: btc-dashboard
 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
 



